<svg width="60" height="100" viewBox="0 0 60 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Zara - Shadow Hunter Silhouette -->
  <defs>
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Body -->
  <ellipse cx="30" cy="30" rx="15" ry="18" fill="url(#bodyGradient)"/>
  
  <!-- Head -->
  <circle cx="30" cy="15" r="12" fill="#0a0a1a"/>
  
  <!-- Legs -->
  <rect x="22" y="45" width="7" height="35" rx="3" fill="#0a0a1a"/>
  <rect x="31" y="45" width="7" height="35" rx="3" fill="#0a0a1a"/>
  
  <!-- Arms (running pose) -->
  <rect x="12" y="28" width="6" height="25" rx="3" fill="#0a0a1a" transform="rotate(-30 15 28)"/>
  <rect x="42" y="28" width="6" height="25" rx="3" fill="#0a0a1a" transform="rotate(30 45 28)"/>
  
  <!-- Cape/Veil (mystical element) -->
  <path d="M 20 35 Q 10 50 15 70 L 20 68 Q 18 55 20 45 Z" fill="#16213e" opacity="0.8"/>
  <path d="M 40 35 Q 50 50 45 70 L 40 68 Q 42 55 40 45 Z" fill="#16213e" opacity="0.8"/>
</svg>
